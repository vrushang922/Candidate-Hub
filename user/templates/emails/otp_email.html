<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OTP Verification</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 0;">

        <!-- Container -->
        <table width="420" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; padding:30px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">

          <!-- Logo / App Name -->
          <tr>
            <td align="center" style="font-size:20px; font-weight:bold; color:#2c3e50;">
             Email Verification
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td height="20"></td></tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="font-size:18px; color:#333;">
              Verify your email
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td height="10"></td></tr>

          <!-- Message -->
          <tr>
            <td align="center" style="font-size:14px; color:#666;">
              Use the following OTP to continue
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td height="25"></td></tr>

          <!-- OTP BOX -->
          <tr>
            <td align="center">
              <div style="
                display:inline-block;
                padding:15px 25px;
                font-size:28px;
                font-weight:bold;
                letter-spacing:6px;
                color:#111;
                background:#f1f3f5;
                border-radius:8px;
              ">
                {{ otp }}
              </div>
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td height="25"></td></tr>

          <!-- Expiry -->
          <tr>
            <td align="center" style="font-size:13px; color:#888;">
              This code will expire in 5 minutes
            </td>
          </tr>

          <!-- Spacer -->
          <tr><td height="20"></td></tr>

          <!-- Divider -->
          <tr>
            <td style="border-top:1px solid #eee;"></td>
          </tr>

          <!-- Spacer -->
          <tr><td height="15"></td></tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="font-size:12px; color:#aaa;">
              If you didn’t request this, you can safely ignore this email.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
